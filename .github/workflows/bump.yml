name: Spotless, bump version, and tag

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: spotless-bump-and-tag
  cancel-in-progress: false

jobs:
  spotless_bump_and_tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Spotless apply
        run: ./gradlew spotlessApply

      - name: Commit Spotless changes
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: spotlessApply"
          git push

      - name: Bump version
        run: bash .github/scripts/bump_version.sh

      - name: Commit version bump
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version"
          git push

      - name: Tag release
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
        run: |
          set -euo pipefail

          tag="v$(grep 'versionName = ' app/build.gradle.kts | sed -n 's/.*"\(.*\)".*/\1/p')"
          repo_url="https://x-access-token:${BOT_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"

          if git ls-remote --tags "$repo_url" | grep -q "refs/tags/${tag}"; then
            echo "Tag ${tag} already exists, aborting."
            exit 1
          fi

          release_id=$(curl -sf -X POST \
            -H "Authorization: token ${BOT_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "$api" \
            -d "{\"tag_name\":\"${tag}\",\"target_commitish\":\"$(git rev-parse HEAD)\",\"name\":\"${tag}\",\"body\":\"Release ${tag}\",\"draft\":false,\"prerelease\":false}" \
            | grep -Po '"id":\s*\K[0-9]+' | head -n1)

          curl -sf -X DELETE \
            -H "Authorization: token ${BOT_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "${api}/${release_id}"
